<!--
  PADDOCKVIEW  -  Kart telemetry viewer (no-map build)
  Schema: Time,Lat,Lon,Speed,Lap,Sector,Ax,Ay,Az,Gas,Brake,Steer,TempWater

   - Lap times from Sector==1 crossings; out-lap + sub-5s excluded; ms -> m:ss.cc
   - Distance = integral of speed (robust to GPS position deviation)
   - Speed trace overlays compare vs reference lap (time/distance toggle)
   - Delta-time: cumulative time gained/lost vs reference, by distance
   - G-G friction circle from Ax/Ay (IMU), coloured by speed
   - Map removed on purpose: GPS position drift distorted the track shape
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PaddockView</title>
<style>
  :root{
    --bg:#13151a; --panel:#1b1e25; --panel-2:#161922;
    --line:#2a2f3a; --line-soft:#23272f;
    --ink:#eceef2; --muted:#8b919e; --muted-2:#5f6675;
    --amber:#ffce3a; --amber-dim:#caa42a;
    --green:#1fc26b; --red:#ff4d4d;
    --s0:#2f6df6; --s1:#1fc26b; --s2:#ffce3a; --s3:#ff4d4d;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --disp:"Arial Narrow","Helvetica Neue Condensed",Roboto,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #1d212b 0%, transparent 60%), var(--bg);
    color:var(--ink); font-family:var(--disp); -webkit-font-smoothing:antialiased;
  }
  .app{display:flex;flex-direction:column;height:100vh;min-height:0}

  header{
    display:flex;align-items:center;gap:18px;padding:14px 20px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,#1a1d24,#161920);
  }
  .brand{display:flex;align-items:baseline;gap:10px;letter-spacing:.02em}
  .brand b{font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;
    background:linear-gradient(90deg,#fff,#cfd3db);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand span{color:var(--amber);font-size:12px;font-family:var(--mono);letter-spacing:.18em;text-transform:uppercase}
  .spacer{flex:1}
  .ctrl{display:flex;align-items:center;gap:8px}
  .ctrl label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  select,.btn{font-family:var(--mono);font-size:13px;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;letter-spacing:.04em}
  select:hover,.btn:hover{border-color:var(--amber-dim)}
  .btn{display:inline-flex;align-items:center;gap:7px;color:var(--amber)}
  .btn svg{width:14px;height:14px;stroke:var(--amber);fill:none;stroke-width:2}

  main{flex:1;min-height:0;display:grid;
    grid-template-columns:1.55fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--line)}
  .cell{background:var(--panel-2);min-height:0;position:relative;display:flex;flex-direction:column}
  .cell.speed{grid-column:1;grid-row:1}
  .cell.delta{grid-column:1;grid-row:2}
  .cell.tower{grid-column:2;grid-row:1}
  .cell.gg{grid-column:2;grid-row:2}
  .cell-h{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line-soft);
    font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .cell-h .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .cell-h .grow{flex:1}
  .cell-h .val{color:var(--ink);font-size:11px;letter-spacing:.06em}
  .cell-h .val.pos{color:var(--red)} .cell-h .val.neg{color:var(--green)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    background:transparent;color:var(--muted);border:0;padding:5px 11px;cursor:pointer}
  .seg button.on{background:var(--amber);color:#1a1407;font-weight:700}
  canvas{display:block;width:100%;flex:1;min-height:0}

  .tower-body{flex:1;min-height:0;overflow:auto}
  .refbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--line-soft)}
  .refbar label{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2)}
  .refbar select{padding:5px 8px;font-size:12px}
  .legref{display:flex;gap:14px;padding:8px 16px;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .legref i{display:inline-block;width:14px;height:2px;vertical-align:middle;margin-right:5px}
  .legref .a{background:linear-gradient(90deg,var(--s0),var(--s3))}
  .legref .b{background:#5b6475}
  table{width:100%;border-collapse:collapse;font-family:var(--mono)}
  thead th{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);
    text-align:right;padding:6px 16px;border-bottom:1px solid var(--line-soft);font-weight:600}
  thead th:first-child{text-align:left}
  tbody td{font-size:14px;padding:9px 16px;text-align:right;border-bottom:1px solid var(--line-soft)}
  tbody td:first-child{text-align:left;color:var(--muted)}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:#20242e}
  tbody tr.sel{background:#262b38}
  tbody tr.sel td:first-child{color:var(--amber)}
  tbody tr.ref td:first-child::after{content:" ◄ref";color:var(--muted-2);font-size:9px}
  .pill{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#1a1407;background:var(--amber);padding:2px 6px;border-radius:5px;font-weight:700}
  .gap-pos{color:var(--red)} .gap-best{color:var(--green)}
  .note{margin:10px 16px;font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--muted-2);border-top:1px dashed var(--line);padding-top:10px}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
    color:var(--muted-2);font-family:var(--mono);font-size:12px;text-align:center;padding:0 24px}

  @media (max-width:880px){
    main{grid-template-columns:1fr;grid-template-rows:repeat(4,minmax(260px,1fr))}
    .cell.speed{grid-row:1;grid-column:1}.cell.tower{grid-row:2;grid-column:1}
    .cell.delta{grid-row:3;grid-column:1}.cell.gg{grid-row:4;grid-column:1}
  }
</style>

<div class="app">
  <header>
    <div class="brand"><b>PaddockView</b><span id="circname">X30 · Osona</span></div>
    <div class="spacer"></div>
    <div class="ctrl">
      <label for="circuit">Circuit</label>
      <select id="circuit">
        <option value="osona">Osona</option>
        <option value="sallent">Sallent</option>
      </select>
    </div>
    <label class="btn" for="file">
      <svg viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>
      Load CSV
      <input id="file" type="file" accept=".csv" hidden>
    </label>
  </header>

  <main>
    <section class="cell speed">
      <div class="cell-h">
        <span class="dot"></span> Speed trace
        <span class="grow"></span>
        <span class="seg" id="axis">
          <button data-axis="dist" class="on">Distance</button>
          <button data-axis="time">Time</button>
        </span>
      </div>
      <canvas id="speedc"></canvas>
    </section>

    <section class="cell delta">
      <div class="cell-h">
        <span class="dot"></span> Delta vs reference
        <span class="grow"></span>
        <span class="val" id="deltaval">--</span>
      </div>
      <canvas id="deltac"></canvas>
    </section>

    <aside class="cell tower">
      <div class="cell-h"><span class="dot"></span> Timing tower</div>
      <div class="refbar">
        <label for="refsel">Reference</label>
        <select id="refsel"></select>
      </div>
      <div class="tower-body" id="tower"></div>
    </aside>

    <section class="cell gg">
      <div class="cell-h">
        <span class="dot"></span> G-G · friction circle
        <span class="grow"></span>
        <span class="val" id="ggmax">--</span>
      </div>
      <canvas id="ggc"></canvas>
    </section>
  </main>
</div>

let rows=[];        // {t,sp,lap,sec,ax,ay,az}
let laps=[];        // {start,end,ms,valid,outlap,num}
let bestIdx=-1, refIdx=-1, selIdx=-1;
let axisMode="dist";

/* ---------- parsing ---------- */
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(!lines.length) return [];
  let start=0, ix={t:0,sp:3,lap:4,sec:5,ax:6,ay:7,az:8};
  const head=lines[0].toLowerCase();
  if(head.includes("lat")&&head.includes("time")){
    const c=lines[0].split(",").map(s=>s.trim().toLowerCase());
    ix={t:c.indexOf("time"),sp:c.indexOf("speed"),lap:c.indexOf("lap"),
        sec:c.indexOf("sector"),ax:c.indexOf("ax"),ay:c.indexOf("ay"),az:c.indexOf("az")};
    start=1;
  }
  const out=[];
  for(let i=start;i<lines.length;i++){
    const c=lines[i].split(",");
    if(c.length<6) continue;
    const t=+c[ix.t]; if(!Number.isFinite(t)) continue;
    out.push({t, sp:+c[ix.sp]||0, lap:+c[ix.lap]||0, sec:+c[ix.sec]||0,
              ax:+c[ix.ax]||0, ay:+c[ix.ay]||0, az:+c[ix.az]||0});
  }
  return out;
}

/* ---------- laps from Sector==1 ---------- */
function computeLaps(rs){
  const marks=rs.filter(r=>r.sec===1).map(r=>r.t);
  const out=[];
  for(let i=1;i<marks.length;i++){
    const ms=marks[i]-marks[i-1];
    out.push({start:marks[i-1],end:marks[i],ms,outlap:(i===1),valid:(i>1)&&ms>5000,num:i});
  }
  return out;
}
function fmt(ms){
  if(!Number.isFinite(ms)||ms<=0) return "--:--";
  const m=Math.floor(ms/60000), s=((ms%60000)/1000).toFixed(2).padStart(5,"0");
  return `${m}:${s}`;
}
function fmtGap(ms){ return (ms>=0?"+":"-")+(Math.abs(ms)/1000).toFixed(2); }

/* distance = integral of speed (km/h -> m/s), robust to GPS drift */
function lapPoints(t0,t1){
  const pts=[]; let d=0, prev=null;
  for(const r of rows){
    if(r.t<t0||r.t>t1) continue;
    if(prev){ const dt=(r.t-prev.t)/1000; d+=(r.sp/3.6)*dt; }
    pts.push({t:r.t-t0, sp:r.sp, ax:r.ax, ay:r.ay, az:r.az, d});
    prev=r;
  }
  return {pts,length:d};
}
function speedColor(v,vmax){
  const st=[[47,109,246],[31,194,107],[255,206,58],[255,77,77]];
  const x=Math.max(0,Math.min(1,vmax>0?v/vmax:0));
  const s=x*(st.length-1),i=Math.floor(s),f=s-i;
  const a=st[i],b=st[Math.min(i+1,st.length-1)],c=k=>Math.round(a[k]+(b[k]-a[k])*f);
  return `rgb(${c(0)},${c(1)},${c(2)})`;
}
function timeAtDist(pts,d){
  if(d<=pts[0].d) return pts[0].t;
  for(let i=1;i<pts.length;i++){
    if(pts[i].d>=d){ const a=pts[i-1],b=pts[i],f=(d-a.d)/((b.d-a.d)||1e-9); return a.t+(b.t-a.t)*f; }
  }
  return pts[pts.length-1].t;
}
function fitCanvas(cv){
  const r=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=Math.max(1,Math.round(r.width*dpr)); cv.height=Math.max(1,Math.round(r.height*dpr));
  const ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx,w:r.width,h:r.height};
}

/* ---------- SPEED TRACE (compare vs reference) ---------- */
function drawSpeed(){
  const {ctx,w,h}=fitCanvas(document.getElementById("speedc"));
  ctx.clearRect(0,0,w,h);
  if(selIdx<0||!laps[selIdx]) return;
  const cmp=lapPoints(laps[selIdx].start,laps[selIdx].end).pts;
  const ref=(refIdx>=0&&refIdx!==selIdx)?lapPoints(laps[refIdx].start,laps[refIdx].end).pts:null;
  if(cmp.length<2) return;

  const padL=42,padR=14,padT=14,padB=26, plotW=w-padL-padR, plotH=h-padT-padB;
  const xOf=p=> axisMode==="time"?p.t:p.d;
  const xmax=Math.max(xOf(cmp[cmp.length-1]), ref?xOf(ref[ref.length-1]):0, 1);
  const vmax=Math.max(...cmp.map(p=>p.sp), ref?Math.max(...ref.map(p=>p.sp)):0, 1);
  const X=v=>padL+(v/xmax)*plotW, Y=v=>padT+plotH-(v/vmax)*plotH;

  ctx.font="9px ui-monospace,monospace"; ctx.textBaseline="middle";
  for(let g=0;g<=4;g++){ const sv=Math.round(vmax*g/4),y=Y(sv);
    ctx.strokeStyle="#23272f"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
    ctx.fillStyle="#5f6675"; ctx.textAlign="right"; ctx.fillText(sv,padL-6,y); }
  ctx.textAlign="center"; ctx.textBaseline="top";
  for(let g=0;g<=4;g++){ const xv=xmax*g/4;
    const lbl=axisMode==="time"?(xv/1000).toFixed(0)+"s":Math.round(xv)+"m";
    ctx.fillStyle="#5f6675"; ctx.fillText(lbl,X(xv),h-padB+6); }
  ctx.fillStyle="#5f6675"; ctx.textAlign="left"; ctx.fillText("km/h",padL-36,padT-2);

  if(ref){ ctx.strokeStyle="#5b6475"; ctx.lineWidth=1.4; ctx.beginPath();
    ref.forEach((p,i)=>{const x=X(xOf(p)),y=Y(p.sp); i?ctx.lineTo(x,y):ctx.moveTo(x,y);}); ctx.stroke(); }
  ctx.lineWidth=2;
  for(let i=1;i<cmp.length;i++){ ctx.strokeStyle=speedColor(cmp[i].sp,vmax);
    ctx.beginPath(); ctx.moveTo(X(xOf(cmp[i-1])),Y(cmp[i-1].sp)); ctx.lineTo(X(xOf(cmp[i])),Y(cmp[i].sp)); ctx.stroke(); }
}

/* ---------- DELTA TIME (cmp - ref, by distance) ---------- */
function drawDelta(){
  const {ctx,w,h}=fitCanvas(document.getElementById("deltac"));
  ctx.clearRect(0,0,w,h);
  const out=document.getElementById("deltaval");
  if(selIdx<0||refIdx<0||selIdx===refIdx){
    out.textContent="pick 2 laps"; out.className="val";
    ctx.fillStyle="#3f4654"; ctx.font="12px ui-monospace,monospace"; ctx.textAlign="center";
    ctx.fillText(laps.filter(l=>l.valid).length<2?"Need 2+ valid laps to compare":"Reference = compare lap", w/2, h/2);
    return;
  }
  const cmp=lapPoints(laps[selIdx].start,laps[selIdx].end).pts;
  const ref=lapPoints(laps[refIdx].start,laps[refIdx].end).pts;
  const dmax=Math.min(cmp[cmp.length-1].d, ref[ref.length-1].d);
  const N=240, delta=[];
  for(let i=0;i<=N;i++){ const d=dmax*i/N;
    delta.push({d, v:(timeAtDist(cmp,d)-timeAtDist(ref,d))/1000}); } // seconds
  const amax=Math.max(0.1, ...delta.map(p=>Math.abs(p.v)));
  const padL=42,padR=14,padT=12,padB=22, plotW=w-padL-padR, plotH=h-padT-padB;
  const X=d=>padL+(d/(dmax||1))*plotW, Y=v=>padT+plotH/2-(v/amax)*(plotH/2);

  ctx.font="9px ui-monospace,monospace"; ctx.textBaseline="middle"; ctx.textAlign="right";
  [amax,0,-amax].forEach(v=>{ const y=Y(v);
    ctx.strokeStyle=v===0?"#39414f":"#23272f"; ctx.lineWidth=v===0?1.3:1;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
    ctx.fillStyle="#5f6675"; ctx.fillText((v>0?"+":"")+v.toFixed(2),padL-6,y); });

  ctx.beginPath(); ctx.moveTo(X(0),Y(0));
  delta.forEach(p=>ctx.lineTo(X(p.d),Y(p.v))); ctx.lineTo(X(dmax),Y(0)); ctx.closePath();
  ctx.fillStyle="rgba(255,206,58,.10)"; ctx.fill();
  ctx.lineWidth=2; ctx.beginPath();
  delta.forEach((p,i)=>{const x=X(p.d),y=Y(p.v); i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.strokeStyle="#ffce3a"; ctx.stroke();

  ctx.textAlign="center"; ctx.textBaseline="top"; ctx.fillStyle="#5f6675";
  for(let g=0;g<=4;g++){ const d=dmax*g/4; ctx.fillText(Math.round(d)+"m",X(d),h-padB+5); }

  const fin=delta[delta.length-1].v;
  out.textContent=(fin>=0?"+":"")+fin.toFixed(2)+" s"; out.className="val "+(fin>=0?"pos":"neg");
}

/* ---------- G-G FRICTION CIRCLE ---------- */
function drawGG(){
  const {ctx,w,h}=fitCanvas(document.getElementById("ggc"));
  ctx.clearRect(0,0,w,h);
  const out=document.getElementById("ggmax");
  if(selIdx<0||!laps[selIdx]){ out.textContent="--"; return; }
  const pts=lapPoints(laps[selIdx].start,laps[selIdx].end).pts;
  const cx=w/2, cy=h/2, R=Math.min(w,h)/2-22;
  const peak=Math.max(1, ...pts.map(p=>Math.max(Math.abs(p.ax),Math.abs(p.ay))));
  const scale=Math.max(2, Math.ceil(peak));     // g at the outer ring
  const toXY=(ay,ax)=>[cx+(ay/scale)*R, cy-(ax/scale)*R];

  ctx.font="8px ui-monospace,monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
  for(let g=1;g<=scale;g++){ const rr=(g/scale)*R;
    ctx.strokeStyle=g===scale?"#39414f":"#23272f"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,cy,rr,0,7); ctx.stroke();
    ctx.fillStyle="#4a5160"; ctx.fillText(g+"g",cx+rr-7,cy-7); }
  ctx.strokeStyle="#23272f"; ctx.beginPath();
  ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
  ctx.fillStyle="#5f6675"; ctx.fillText("accel",cx,cy-R-9); ctx.fillText("brake",cx,cy+R+9);
  ctx.textAlign="left"; ctx.fillText("lat",cx+R+2,cy);

  const vmax=Math.max(...pts.map(p=>p.sp),1);
  let clip=0;
  for(const p of pts){
    if(Math.abs(p.ax)>=1.999||Math.abs(p.ay)>=1.999) clip++;
    const [x,y]=toXY(p.ay,p.ax);
    ctx.fillStyle=speedColor(p.sp,vmax); ctx.globalAlpha=.55;
    ctx.beginPath(); ctx.arc(x,y,2.1,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  const clipPct=Math.round(100*clip/pts.length);
  if(clipPct>10){ out.textContent="⚠ "+clipPct+"% @±2g"; out.className="val pos"; }
  else { out.textContent="peak "+peak.toFixed(1)+"g"; out.className="val"; }
}

/* ---------- TIMING TOWER ---------- */
function renderTower(){
  const el=document.getElementById("tower");
  if(!laps.length){
    el.innerHTML=`<div class="empty"><div>No crossings in this log</div>
      <div style="color:#3f4654">Press the meta button on track to set start/finish</div></div>`;
    document.getElementById("refsel").innerHTML="";
    return;
  }
  const best=bestIdx>=0?laps[bestIdx]:null;
  const valid=laps.filter(l=>l.valid);

  const rs=document.getElementById("refsel");
  rs.innerHTML=valid.map(l=>{const i=laps.indexOf(l);
    return `<option value="${i}" ${i===refIdx?"selected":""}>L${l.num-1} · ${fmt(l.ms)}</option>`;}).join("");

  let html=`<div class="legref"><span><i class="a"></i>compare</span><span><i class="b"></i>reference</span></div>`;
  html+=`<table><thead><tr><th>Lap</th><th>Time</th><th>Gap</th><th>Top</th></tr></thead><tbody>`;
  laps.forEach((l,i)=>{
    if(!l.valid&&!l.outlap) return;
    const p=lapPoints(l.start,l.end).pts;
    const top=p.length?Math.round(Math.max(...p.map(x=>x.sp))):0;
    const sel=i===selIdx?"sel":"", isref=i===refIdx?"ref":"";
    if(l.outlap){
      html+=`<tr class="${sel} ${isref}" data-i="${i}"><td>out</td>
        <td style="color:#5f6675">${fmt(l.ms)}</td><td style="color:#3f4654">—</td>
        <td style="color:#5f6675">${top}</td></tr>`;
    }else{
      const gap=(i===bestIdx)?`<span class="pill">best</span>`:
        `<span class="${l.ms-best.ms>=0?"gap-pos":"gap-best"}">${fmtGap(l.ms-best.ms)}</span>`;
      html+=`<tr class="${sel} ${isref}" data-i="${i}"><td>L${l.num-1}</td>
        <td>${fmt(l.ms)}</td><td>${gap}</td><td style="color:#8b919e">${top}</td></tr>`;
    }
  });
  html+=`</tbody></table>`;
  html+=`<div class="note">Times from meta crossings (Sector=1). Out-lap and sub-5s laps excluded.
    Distance and delta use integrated speed, not GPS position. Tap a lap = compare; pick reference above.</div>`;
  el.innerHTML=html;
  el.querySelectorAll("tr[data-i]").forEach(tr=>{
    tr.onclick=()=>{ selIdx=+tr.dataset.i; redraw(); };
  });
}

function redraw(){ renderTower(); drawSpeed(); drawDelta(); drawGG(); }

function load(rs){
  rows=rs; laps=computeLaps(rows);
  const valids=laps.map((l,i)=>({l,i})).filter(o=>o.l.valid);
  bestIdx=valids.length?valids.reduce((b,o)=>o.l.ms<laps[b].ms?o.i:b,valids[0].i):-1;
  refIdx=bestIdx;
  selIdx = valids.length>1 ? valids.find(o=>o.i!==bestIdx).i : (bestIdx>=0?bestIdx:(laps.length?laps.length-1:-1));
  redraw();
}

/* ---------- wiring ---------- */
document.getElementById("file").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const fr=new FileReader();
  fr.onload=()=>{ try{ load(parseCSV(fr.result)); }catch(err){ console.error(err); } };
  fr.readAsText(f);
});
document.getElementById("axis").addEventListener("click",e=>{
  const b=e.target.closest("button[data-axis]"); if(!b) return;
  axisMode=b.dataset.axis;
  document.querySelectorAll("#axis button").forEach(x=>x.classList.toggle("on",x===b));
  drawSpeed();
});
document.getElementById("refsel").addEventListener("change",e=>{ refIdx=+e.target.value; redraw(); });
document.getElementById("circuit").addEventListener("change",e=>{
  document.getElementById("circname").textContent="X30 · "+CIRCUITS[e.target.value].name;
});
window.addEventListener("resize",()=>{ drawSpeed(); drawDelta(); drawGG(); });

load(parseCSV(RAW_EMBED.replace(/\\n/g,"\n")));
</script>
